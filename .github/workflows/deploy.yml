name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  build-and-test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
      JWT_SECRET: "test-secret"
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Next.js Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          for i in {1..3}; do
            npm run build && break || {
              if [ $i -lt 3 ]; then
                echo "Build failed. Retrying in 10 seconds... (Attempt $i/3)"
                sleep 10
              else
                echo "Build failed after 3 attempts."
                exit 1
              fi
            }
          done

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: lavyer_website:latest
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy?schema=public

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd lavyer_website
            # Fetch and reset to avoid local conflict issues
            git fetch origin master
            git reset --hard origin/master
            # Ensure the web-network exists on the server (safety check)
            docker network create web-network 2>/dev/null || true
            # Rebuild and start the app container (NPM handles routing)
            docker compose up -d --build app
            # Sync database schema
            docker compose exec -T app npx prisma db push
            
            # Cleanup: Remove build cache and dangling images to save disk space
            docker builder prune -a -f
            docker image prune -f
            
            echo "Deployment successful!"

